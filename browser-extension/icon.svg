<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e879f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67e8f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="56" fill="url(#bg)" stroke="none"/>

  <!-- Play button icon -->
  <polygon points="48,40 48,88 88,64" fill="url(#icon)" stroke="none"/>

  <!-- Cookie bite -->
  <circle cx="85" cy="45" r="8" fill="url(#bg)" stroke="none"/>
  <circle cx="82" cy="42" r="3" fill="white" opacity="0.8"/>
  <circle cx="87" cy="47" r="2" fill="white" opacity="0.6"/>
</svg>
